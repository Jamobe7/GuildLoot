<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Botín</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0b0d13;
    --line:#262a3a;
    --ink:#ece9f5;
    --muted:#8a879c;
    --epic:#a335ee;
    --legendary:#ff8000;
    --ok:#43d17a;
    --err:#ff5964;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Barlow',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1b1636 0%, rgba(27,22,54,0) 60%),
      var(--bg);
    color:var(--ink);
    min-height:100%;
    display:grid;
    place-items:center;
    padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;
    max-width:520px;
    background:linear-gradient(180deg,#161826 0%, #101119 100%);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.03);
    animation:rise .7s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  /* Firma: el espectro de rareza de objetos de WoW */
  .spectrum{
    height:4px;width:100%;
    background:linear-gradient(90deg,
      #9d9d9d 0 16%, #ffffff 16% 33%, #1eff00 33% 50%,
      #0070dd 50% 66%, #a335ee 66% 83%, #ff8000 83% 100%);
  }
  .body{padding:40px 40px 34px}
  .eyebrow{
    font-weight:600;font-size:12px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--muted);margin-bottom:18px;
  }
  h1{font-family:'Cinzel',serif;font-weight:700;font-size:34px;line-height:1.08}
  h1 .accent{color:var(--epic)}
  .lede{margin-top:14px;color:var(--muted);font-size:15.5px;line-height:1.55;max-width:42ch}
  .status{
    margin-top:30px;display:flex;align-items:flex-start;gap:12px;
    padding:14px 16px;border:1px solid var(--line);border-radius:10px;
    background:rgba(255,255,255,.02);font-size:14.5px;
  }
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex:none;margin-top:5px}
  .status.checking .dot{background:var(--legendary);animation:pulse 1.1s ease-in-out infinite}
  .status.ok .dot{background:var(--ok);box-shadow:0 0 12px var(--ok)}
  .status.warn .dot{background:var(--legendary)}
  .status.err .dot{background:var(--err);box-shadow:0 0 12px var(--err)}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  .status .sub{display:block;color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.45}
  .foot{margin-top:22px;display:flex;gap:14px;align-items:center}
  button{
    font-family:'Barlow';font-weight:600;font-size:13px;color:var(--ink);
    background:transparent;border:1px solid var(--line);border-radius:8px;
    padding:9px 14px;cursor:pointer;transition:border-color .15s,background .15s;
  }
  button:hover{border-color:var(--epic);background:rgba(163,53,238,.08)}
  button:focus-visible{outline:2px solid var(--epic);outline-offset:2px}
  .tag{margin-left:auto;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  @media (max-width:480px){.body{padding:30px 24px}h1{font-size:27px}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
  <main class="card">
    <div class="spectrum" aria-hidden="true"></div>
    <div class="body">
      <p class="eyebrow">Gestión de botín · RC Loot Council</p>
      <h1>Registro de <span class="accent">Botín</span></h1>
      <p class="lede">El histórico de reparto de la hermandad. Importa el JSON de RCLootCouncil y consulta quién se ha llevado qué.</p>

      <div id="status" class="status checking" role="status" aria-live="polite">
        <span class="dot" aria-hidden="true"></span>
        <span><span id="status-txt">Comprobando la conexión…</span><span class="sub" id="status-sub"></span></span>
      </div>

      <div class="foot">
        <button id="retry" type="button">Reintentar</button>
        <span class="tag">Publicada correctamente</span>
      </div>
    </div>
  </main>

<script>
  // ─────────────────────────────────────────────────────────────
  //  CONFIGURA ESTO  (panel de Supabase → Settings → API)
  //  · SUPABASE_URL:      "Project URL"
  //  · SUPABASE_ANON_KEY: clave pública (anon / publishable)
  //  Es seguro que esta clave sea pública: el RLS solo permite leer.
  // ─────────────────────────────────────────────────────────────
  const SUPABASE_URL = "https://zobxpskhqfftagrilcli.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_yfcPrKCtkgB6gxe-_dz3qQ_yOTCgKjI";

  const box = document.getElementById('status');
  const txt = document.getElementById('status-txt');
  const sub = document.getElementById('status-sub');

  function setStatus(kind, message, detail = ''){
    box.className = 'status ' + kind;
    txt.textContent = message;
    sub.textContent = detail;
  }

  async function check(){
    if (SUPABASE_URL.includes('TU-PROYECTO') || SUPABASE_ANON_KEY.startsWith('TU_')){
      setStatus('warn', 'Falta configurar la conexión',
        'Edita SUPABASE_URL y SUPABASE_ANON_KEY en este archivo con los valores de tu proyecto.');
      return;
    }
    setStatus('checking', 'Comprobando la conexión…');
    try{
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { count, error } = await db
        .from('awards')
        .select('*', { count: 'exact', head: true });
      if (error) throw error;
      const n = count ?? 0;
      setStatus('ok', 'Conectado a Supabase',
        n === 0
          ? 'Sin entregas todavía — importa tu primer JSON.'
          : `${n} ${n === 1 ? 'entrega registrada' : 'entregas registradas'}.`);
    }catch(e){
      setStatus('err', 'No se pudo conectar',
        'Revisa la Project URL y la clave anónima. Detalle: ' + (e?.message ?? e));
    }
  }

  document.getElementById('retry').addEventListener('click', check);
  check();
</script>
</body>
</html>
